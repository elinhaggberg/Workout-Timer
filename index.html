<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // Applied before the stylesheet paints, since the module script that
    // normally owns theming (js/theme.js) runs after HTML parsing and would
    // otherwise flash the default light theme first on every load.
    try {
      var themeMode = (JSON.parse(localStorage.getItem("wt_theme_v1") || "{}") || {}).mode;
      if (themeMode) document.documentElement.dataset.theme = themeMode;
    } catch (e) {}
  </script>

  <link rel="icon" href="icons/icon-192.png" />

  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="css/style.css" />
</head>

  <template id="tpl-tabata-setup">

      <header class="sheet-header">

        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>

  <template id="tpl-instructions">
    <div class="sheet instructions-sheet">
      <header class="sheet-header">
        <h2>Instructions</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <div class="instructions-body">
        <section>
          <h3>Installing on your phone</h3>
          <p>This is a web app, not an app-store app — but you can add it to your Home Screen so it opens full-screen, just like a regular app.</p>
          <p><strong>iOS (Safari):</strong> tap the Share icon, then "Add to Home Screen".</p>
          <p><strong>Android (Chrome):</strong> tap the ⋮ menu, then "Add to Home screen" (or "Install app").</p>
        </section>
        <section>
          <h3>Building a workout</h3>
          <p>Tap the <strong>+</strong> button on the home screen to start a new workout, give it a name, then add intervals — either a timed exercise or a rep-based one.</p>
        </section>
        <section>
          <h3>Sets</h3>
          <p>Group a few intervals into a <strong>Set</strong> to repeat them for several rounds — perfect for circuits. Give the Set its own name and adjust the rounds with the stepper.</p>
        </section>
        <section>
          <h3>Reordering</h3>
          <p>Press and drag the grip handle on the left of any card to reorder intervals and Sets.</p>
        </section>
        <section>
          <h3>Playing a workout</h3>
          <p>Tap play from the home screen or preview and it starts right away — no extra tap needed. Use the sound icon to toggle beeps, and the prev/next buttons to move between intervals.</p>
        </section>
        <section>
          <h3>Quick Tabata timer</h3>
          <p>The stopwatch button on the home screen opens a one-off work/rest timer you can start immediately without saving it as a workout.</p>
        </section>
        <section>
          <h3>Backup &amp; sharing</h3>
          <p>In the gear menu, export a single workout to share with someone, or back up everything at once. Importing always merges into your existing workouts — it never replaces them.</p>
        </section>
        <section>
          <h3>Your data</h3>
          <p>Everything you create is stored only on this device — there's no account and no server. Nothing is backed up automatically, so if you switch phones or clear your browser data, your workouts are gone unless you've exported them yourself.</p>
          <p><strong>Removing the app from your Home Screen deletes its saved data too</strong> — it's not just an icon, so deleting it works the same as uninstalling an app.</p>
          <p>Use <strong>Export all data</strong> in the gear menu every so often to keep a backup, and <strong>Import</strong> to bring it back.</p>
        </section>
        <section>
          <h3>Themes</h3>
          <p>Pick Dark, Light, or Playful from the gear menu. Playful lets you choose your own accent color too.</p>
        </section>
      </div>
    </div>
  </template>
